name: Backfill Articles (one-shot)

on:
  workflow_dispatch:
    inputs:
      topic_id:
        description: '特定トピック ID のみ処理（空欄で全件）'
        required: false
        default: ''
      dry_run:
        description: 'dry-run: WPへの書き込みなし（true/false）'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths: ['.backfill_trigger']

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "anthropic>=0.40.0" requests python-dotenv

      - name: Resolve parameters
        id: params
        run: |
          if [ -f .backfill_trigger ]; then
            DRY_RUN=$(python3 -c "import json; d=json.load(open('.backfill_trigger')); print(str(d.get('dry_run', False)).lower())")
            TOPIC_ID=$(python3 -c "import json; d=json.load(open('.backfill_trigger')); tid=d.get('topic_id'); print(tid if tid is not None else '')")
          else
            DRY_RUN="${{ github.event.inputs.dry_run }}"
            TOPIC_ID="${{ github.event.inputs.topic_id }}"
          fi
          echo "dry_run=$DRY_RUN"   >> $GITHUB_OUTPUT
          echo "topic_id=$TOPIC_ID" >> $GITHUB_OUTPUT
          echo "[INFO] dry_run=$DRY_RUN  topic_id=${TOPIC_ID:-全件}"

      - name: Run backfill
        run: |
          ARGS=""
          if [ "${{ steps.params.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ steps.params.outputs.topic_id }}" ]; then
            ARGS="$ARGS --id ${{ steps.params.outputs.topic_id }}"
          fi
          echo "[RUN] python automation/backfill_articles.py $ARGS"
          python automation/backfill_articles.py $ARGS 2>&1 | tee /tmp/backfill.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        id: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}

      - name: Commit result log
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          LOG_PATH="articles/backfill/result_${TIMESTAMP}.log"
          mkdir -p articles/backfill
          cp /tmp/backfill.log "$LOG_PATH" 2>/dev/null || echo "(no log)" > "$LOG_PATH"
          git add "$LOG_PATH"
          git diff --staged --quiet || git commit -m "backfill: result log ${TIMESTAMP} [skip ci]"
          git push
