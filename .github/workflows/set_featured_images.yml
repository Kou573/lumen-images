name: Set Featured Images (Backfill)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '処理する最大投稿数（空白 = 全件）'
        required: false
        default: ''

jobs:
  set-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Set featured images
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python automation/set_featured_images.py --limit ${{ github.event.inputs.limit }}
          else
            python automation/set_featured_images.py
          fi
        env:
          WP_URL:          ${{ secrets.WP_URL }}
          WP_USERNAME:     ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
