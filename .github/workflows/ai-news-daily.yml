name: AI News Daily

on:
  schedule:
    - cron: '5 23 * * *'  # 08:05 JST
  workflow_dispatch:

jobs:
  send-ai-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install slack_sdk

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect, summarize and post
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          set -e
          # Run from /tmp to prevent CLAUDE.md (COO persona) from being auto-discovered,
          # which would cause Claude to try using the Agent tool unavailable in CI.
          cd /tmp
          claude -p "$(cat $GITHUB_WORKSPACE/ai-news/prompt.txt)" \
            --allowedTools "WebSearch,WebFetch" \
            --output-format text \
            > /tmp/ai_news.txt
          python $GITHUB_WORKSPACE/ai-news/post_to_slack.py < /tmp/ai_news.txt
