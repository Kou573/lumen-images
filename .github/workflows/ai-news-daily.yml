name: AI News Daily

on:
  schedule:
    - cron: '5 23 * * *'  # 08:05 JST
  workflow_dispatch:

jobs:
  send-ai-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 slack_sdk lxml

      - name: Fetch raw news
        run: python ai-news/fetch_raw_news.py > /tmp/raw_news.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Summarize and post
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          claude -p "$(printf '以下のAIニュースサイトの生データから、過去24時間以内の重要ニュースをSlack向けにまとめてください。\n\n【優先順位（高い順）】\n1. 大手LLMの新モデルリリース・バージョンアップ（OpenAI / Anthropic / Google / DeepMind / Meta）\n2. API仕様変更・料金改定・廃止予告\n3. 障害・インシデント情報\n4. 大型資金調達・買収・提携\n5. その他の業界動向\n\n【出力フォーマット（厳守）】\n\n1行目: 🤖 AI最新ニュース | {今日の日付（例: 2026年5月27日（水））}\n\n🔴 【要注意】セクションは、モデル廃止予告・API破壊的変更・大規模障害など開発者が即対応すべき場合のみ冒頭に追加する（通常は省略）:\n🔴 【要注意】*タイトル*\n内容\n• 詳細\n:paperclip: <URL>\n\n企業別セクション（該当する企業のみ、情報がない場合は省略）:\n🟢 OpenAI\n🔵 Anthropic\n🟡 Google / DeepMind\n⚪ その他企業\n\n各セクション内のニュースは:\n*① タイトル*\n1〜2行の説明\n• 詳細は箇条書き\n> 背景・影響（重要な場合のみ）\n:paperclip: <URL>\n\n最後に:\n📌 業界動向\n_収集元: [使用したソース名] / 対象期間: 過去24時間_\n\n【ルール】\n- 区切り線（---）は使わない\n- セクション間は空行1行のみ\n- URLは:paperclip: の後に<URL>形式で\n- 日本語で出力\n- 情報がない日は「本日の主要アップデートなし」と記載\n\n--- データ ---\n'; head -c 20000 /tmp/raw_news.txt)" | python ai-news/post_to_slack.py
