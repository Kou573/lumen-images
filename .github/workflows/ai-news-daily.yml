name: AI News Daily

on:
  schedule:
    - cron: '5 23 * * *'  # 08:05 JST
  workflow_dispatch:

jobs:
  send-ai-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 slack_sdk lxml

      - name: Fetch raw news
        run: python ai-news/fetch_raw_news.py > /tmp/raw_news.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Summarize and post
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          claude -p "$(printf '以下のAIニュースサイトの生データから、過去24時間以内の重要ニュースをSlack向けにまとめてください。\n\nフォーマット:\n- 見出しは太字（*見出し*）\n- 各ニュースにソースURLを記載\n- モデルリリース・API変更・障害情報は特に強調\n- 日本語で出力\n\n--- データ ---\n'; head -c 20000 /tmp/raw_news.txt)" --dangerously-skip-permissions | python ai-news/post_to_slack.py
