name: AI News Daily

on:
  schedule:
    - cron: '5 23 * * *'  # 08:05 JST
  workflow_dispatch:

jobs:
  send-ai-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r ai-news/requirements.txt
      - name: Fetch and send AI news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python ai-news/fetch_news.py
