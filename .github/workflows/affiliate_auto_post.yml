name: Affiliate Site Auto Post

on:
  schedule:
    - cron: '0 23 * * *'  # JST 08:00 (UTC 23:00)
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.trigger']

# 同時実行を防止（前のジョブが終わる前に次が起動しない）
# cancel-in-progress: false にすることで、後続ジョブは「待機」して実行される
# （同じ記事を2度投稿しない重要な設定）
concurrency:
  group: affiliate-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 15分でタイムアウト（通常2〜5分で完了）
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "anthropic>=0.40.0" requests python-dotenv
          # openai はキーが設定されている場合のみ必要だが常にインストール
          pip install "openai>=1.0.0"

      - name: Check secrets and environment
        run: |
          python -c "import anthropic; print('[OK] anthropic:', anthropic.__version__)"
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo '[FATAL] ANTHROPIC_API_KEY is not set!'
            exit 1
          fi
          echo "[OK] ANTHROPIC_API_KEY set (length=${#ANTHROPIC_API_KEY})"
          if [ -n "${OPENAI_API_KEY}" ]; then
            python -c "import openai; print('[OK] openai:', openai.__version__)"
            echo "[OK] OPENAI_API_KEY set → GPT-image generation ENABLED"
          else
            echo "[INFO] OPENAI_API_KEY not set → Unsplash images will be used"
          fi
          echo "[OK] WP_URL: ${WP_URL:-(not set)}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          WP_URL:            ${{ secrets.WP_URL }}

      # ── STEP 1: 記事生成 + posted:true をローカルに書き込む ──
      # WordPress への投稿はここでは行わない。
      # git push が失敗した場合に同じ記事が再投稿されるのを防ぐため。
      - name: Generate article and save to repo
        run: python automation/run_affiliate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}

      # ── STEP 2: git push（posted:true の確定） ──
      # このステップが成功して初めて「投稿済み」として扱われる。
      # 失敗した場合は次回実行で再生成されるが、WordPress にはまだ投稿されていないため重複しない。
      - name: Commit article, images and updated topics
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add articles/latest.json automation/topics/saas_topics.json
          # AI生成画像があればコミット
          git add articles/images/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Add new article [skip ci]"
          git push

      # ── STEP 3: WordPress への投稿（git push 成功後のみ実行） ──
      # 重複防止の二重構造:
      #   1. latest.json の wp_post_id が設定済みならスキップ
      #   2. WordPress 側で同タイトル記事が存在すればスキップ
      # git push が失敗した場合、このステップは実行されない（if: success() のデフォルト動作）。
      - name: Post to WordPress
        run: python automation/post_to_wordpress.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
