name: Affiliate Site Auto Post

on:
  schedule:
    - cron: '0 1 * * *'  # JST 10:00 (UTC 01:00)
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.trigger']

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv

      - name: Generate and post affiliate article
        run: python automation/run_affiliate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}

      - name: Commit updated topics
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add automation/topics/saas_topics.json
          git diff --staged --quiet || git commit -m "Mark topic as posted [skip ci]"
          git push
