name: Affiliate Site Auto Post

on:
  schedule:
    - cron: '0 1 * * *'  # JST 10:00 (UTC 01:00)
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.trigger']

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv

      - name: Generate article and save to repo
        run: python automation/run_affiliate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}

      - name: Commit article and updated topics
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add articles/latest.json automation/topics/saas_topics.json
          git diff --staged --quiet || git commit -m "Add new article [skip ci]"
          git push

      - name: Trigger WordPress WP-Cron
        run: curl -s "${{ secrets.WP_URL }}/wp-cron.php?doing_wp_cron" -o /dev/null -w "WP-Cron: %{http_code}"
