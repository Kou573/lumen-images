name: Monthly Revenue Report

on:
  schedule:
    - cron: '0 0 1 * *'  # JST 9:00 on the 1st of each month (UTC 00:00)
  workflow_dispatch:       # 手動実行も可能

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # output/revenue_reports/ をコミットするために必要

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-analytics-data python-dotenv

      - name: Generate revenue report
        run: python automation/revenue_reporter.py
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}

      - name: Commit revenue report
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add output/revenue_reports/
          git diff --staged --quiet || git commit -m "Add monthly revenue estimate report [skip ci]"
          git push
